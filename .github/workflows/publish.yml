name: Publish

on:
  push:
    branches: [master]

jobs:
  publish:
    name: Publish canary to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publisher

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish canary (if version is new)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm show dexie-encrypted@$VERSION version 2>/dev/null || echo "")
          if [ -z "$PUBLISHED" ]; then
            echo "Publishing dexie-encrypted@$VERSION as canary..."
            npm publish --tag canary --provenance --access public
          else
            echo "dexie-encrypted@$VERSION already published, skipping."
          fi
